<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

<body>

    <div class="main">

        <div class="nav">

                <img src="./images/poke-logo.png" alt="">
            </div>
            <div class="menu">
                <i class="fa-solid fa-bars" style="color: rgb(0, 0, 0);"></i>
            </div>
        </div>
        <div class="left">
            <img src="./images/poke-wm.png" alt="">
           <div class="card">

            <h1>Pikachu</h1>
            <p>Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and incredibly
                cute mouse-like Pokémon.They are almost completely covered by yellow fur.</p>
            <div class="number">
                 <div class="dash"></div>
            <h5>01/08</h5>
            </div>
               
           </div>
        </div>
        <div class="right">
            <img src="./images/pikachu.png" alt="">

            <div class="dots">
                <div class="circle"></div>
                <div class="circle"></div>

                <div class="circle"></div>
            </div>
        </div>
